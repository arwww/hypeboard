name: Continuous integration

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pipeline-tests:
    name: Python pipeline and data contracts
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline tests
        run: pytest

      - name: Rebuild bundled output offline
        run: python -m pipeline.run_pipeline --offline

      - name: Validate generated JSON
        run: python -m pipeline.validation.validate_output

  frontend-tests:
    name: React tests and production build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Run component tests
        working-directory: frontend
        run: npm test

      - name: Build production frontend
        working-directory: frontend
        run: npm run build
