name: Daily data update and Pages deployment

on:
  schedule:
    - cron: '37 23 * * *'
      timezone: 'Europe/Berlin'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: hypeboard-production
  cancel-in-progress: false

env:
  HYPEBOARD_USER_AGENT: ${{ vars.HYPEBOARD_USER_AGENT || 'Hypeboard/1.0 (public dashboard; configure repository variable HYPEBOARD_USER_AGENT)' }}
  HYPEBOARD_SOCIAL_DATA_URL: ${{ secrets.HYPEBOARD_SOCIAL_DATA_URL }}

jobs:
  update-build:
    name: Fetch, score, validate and build
    runs-on: ubuntu-latest
    outputs:
      report-path: ${{ steps.report.outputs.path }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Restore last successful provider caches
        uses: actions/cache@v4
        with:
          path: |
            data/raw/market_data
            data/raw/wikipedia
            data/raw/finra_short_volume
            data/raw/social
          key: hypeboard-source-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            hypeboard-source-cache-${{ runner.os }}-

      - name: Run Python tests before update
        run: pytest

      - name: Fetch public sources and calculate scores
        run: python -m pipeline.run_pipeline

      - name: Validate generated JSON and data quality
        run: python -m pipeline.validation.validate_output

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Build static frontend
        working-directory: frontend
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Add update report to workflow summary
        id: report
        run: |
          cat data/metadata/update-report.md >> "$GITHUB_STEP_SUMMARY"
          echo "path=data/metadata/update-report.md" >> "$GITHUB_OUTPUT"

      - name: Upload update report
        uses: actions/upload-artifact@v4
        with:
          name: hypeboard-update-report
          path: |
            data/metadata/update-report.md
            frontend/public/data/meta.json
          retention-days: 30

      - name: Commit refreshed data snapshots
        run: |
          if git diff --quiet -- frontend/public/data data/processed data/history data/metadata pipeline/validation/schemas; then
            echo "No tracked data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data data/processed data/history data/metadata pipeline/validation/schemas
          git commit -m "chore(data): refresh Hypeboard signals [skip ci]"
          git push

  deploy:
    name: Deploy to GitHub Pages
    needs: update-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
